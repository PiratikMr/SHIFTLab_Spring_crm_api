services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5444:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data

  spring:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring_api
    ports:
      - "8080:8080"
    depends_on:
      - db
    command: java -jar /project/build/libs/spring-crm-api.jar

volumes:
  postgres_volume: